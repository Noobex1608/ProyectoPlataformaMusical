<div class="max-w-5xl mx-auto mt-10">
    <h2 class="text-2xl font-bold mb-2">Elige tu Membresía</h2>
    <p class="mb-6 text-gray-500">Desbloquea más funciones y obtén beneficios exclusivos</p>

    <div class="grid md:grid-cols-3 gap-6">
        <div *ngFor="let m of membresias" class="relative border rounded-xl p-6 shadow bg-white transition duration-300"
            [ngClass]="{ 'border-blue-600 ring-2 ring-blue-400': esActiva(m), 'hover:shadow-lg': true }"
            (click)="activarMembresia(m)">
            <h3 class="text-xl font-semibold mb-1">{{ m.nombre }}</h3>
            <p class="text-gray-700 mb-4">${{ m.precio }}/mes</p>

            <ul class="mb-4 space-y-1 text-sm">
                <li *ngFor="let b of m.beneficios" class="flex items-center gap-2">
                    <span class="text-green-600">✔</span> {{ b }}
                </li>
            </ul>

            <button class="w-full py-2 rounded font-semibold transition" [ngClass]="{
                'bg-gray-400 text-white cursor-not-allowed': esActiva(m),
                'bg-blue-600 text-white hover:bg-blue-700': !esActiva(m)
              }" [disabled]="esActiva(m)">
                {{ esActiva(m) ? 'Membresía seleccionada' : 'Seleccionar Membresía' }}
            </button>

            <div *ngIf="esActiva(m)"
                class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-blue-500 text-white text-xs px-3 py-1 rounded-full">
                Seleccionada
            </div>
        </div>
    </div>
</div>
