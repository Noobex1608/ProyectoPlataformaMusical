<h2>💸 Enviar una Propina</h2>

<form (ngSubmit)="enviar()">
    <label>Monto:
        <input type="number" [(ngModel)]="nuevaPropina.monto" name="monto" required />
    </label>
    <br />
    <label>Mensaje:
        <input type="text" [(ngModel)]="nuevaPropina.mensaje" name="mensaje" required />
    </label>
    <br />
    <button type="submit">Enviar Propina</button>
</form>

<hr />

<h3>📜 Historial de Propinas</h3>
<ul *ngIf="propinas.length > 0; else noPropinas">
    <li *ngFor="let p of propinas">
        💰 {{ p.monto }} - "{{ p.mensaje }}"
    </li>
</ul>

<ng-template #noPropinas>
    <p>No has enviado ninguna propina aún.</p>
</ng-template>
