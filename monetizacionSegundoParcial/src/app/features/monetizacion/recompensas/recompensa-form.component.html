<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded-2xl shadow-lg border border-gray-200">
    <h2 class="text-2xl font-bold text-center mb-6">➕ Nueva Recompensa</h2>

    <form (ngSubmit)="guardar()" class="space-y-5">

        <!-- Nombre -->
        <div>
            <label for="nombre" class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
            <input id="nombre" name="nombre" type="text" [(ngModel)]="recompensa.nombre" required
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Ej: Camiseta exclusiva" />
        </div>

        <!-- Descripción -->
        <div>
            <label for="descripcion" class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
            <textarea id="descripcion" name="descripcion" [(ngModel)]="recompensa.descripcion" required
                class="w-full px-4 py-2 border border-gray-300 rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Describe la recompensa..." rows="3"></textarea>
        </div>

        <!-- Costo -->
        <div>
            <label for="costoPuntos" class="block text-sm font-medium text-gray-700 mb-1">Costo en puntos</label>
            <input id="costoPuntos" name="costoPuntos" type="number" [(ngModel)]="recompensa.costoPuntos" required
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Ej: 100" min="0" />
        </div>

        <!-- Botón -->
        <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition">
            Guardar Recompensa
        </button>
    </form>
</div>
